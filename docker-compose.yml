version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eventmanager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: eventdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: eventmanager-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
